version: '3.8'

services:
  kotlin-service:
    build: ../kotlin-service
    container_name: ${COMPOSE_PROJECT_NAME}-kotlin-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${KOTLIN_SERVICE_PORT}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVICE_NAME: ${KOTLIN_SERVICE_NAME}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC}
      OUTBOX_POLL_INTERVAL_MS: ${OUTBOX_POLL_INTERVAL_MS}
      OUTBOX_MAX_RETRY: ${OUTBOX_MAX_RETRY}
      OUTBOX_RETENTION_DAYS: ${OUTBOX_RETENTION_DAYS}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_FORMAT: ${LOG_FORMAT}
      ENVIRONMENT: ${ENVIRONMENT}
      APP_VERSION: ${APP_VERSION}
      JAVA_OPTS: ${KOTLIN_SERVICE_JAVA_OPTS}
      MINIO_ENDPOINT: http://minio:${MINIO_PORT}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${S3_BUCKET}
    networks:
      - modelforge-net
    mem_limit: ${KOTLIN_SERVICE_MEM_LIMIT}
    cpus: ${KOTLIN_SERVICE_CPU_LIMIT}
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - logging=promtail
