version: '3.8'

services:
  frontend:
    build: ../frontend
    container_name: ${COMPOSE_PROJECT_NAME}-frontend
    depends_on:
      - kotlin-service
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - modelforge-net
    mem_limit: ${FRONTEND_MEM_LIMIT:-128m}
    cpus: ${FRONTEND_CPU_LIMIT:-0.25}
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - logging=promtail
