spring:
  application:
    name: ${SERVICE_NAME:modelforge-kotlin-service}

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:modelforge_db}
    username: ${POSTGRES_USER:modelforge}
    password: ${POSTGRES_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true

logging:
  config: classpath:logback-spring.xml

modelforge:
  environment: ${ENVIRONMENT:development}
  version: ${APP_VERSION:0.1.0}
  jwt:
    secret: ${JWT_SECRET_KEY}
    expiration-hours: ${JWT_EXPIRATION_HOURS:24}
