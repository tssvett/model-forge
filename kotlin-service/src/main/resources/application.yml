spring:
  application:
    name: modelforge-kotlin-service

  # БД (H2 для локальной разработки)
  datasource:
    url: jdbc:h2:mem:modelforge;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # Liquibase
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

server:
  port: 8080

# Actuator: health, info, prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# Kafka (embedded для локальной разработки отключен)
spring.kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# ModelForge
modelforge:
  environment: ${ENVIRONMENT:development}
  version: ${APP_VERSION:0.1.0}
  jwt:
    secret: ${JWT_SECRET_KEY:default-dev-secret-key-min-32-characters-long!!}
    expiration-hours: ${JWT_EXPIRATION_HOURS:24}
  kafka:
    topic: ${KAFKA_TOPIC:modelforge.generation.requests}
  outbox:
    poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:5000}
    max-retry: ${OUTBOX_MAX_RETRY:3}
    batch-size: ${OUTBOX_BATCH_SIZE:50}
    retention-days: ${OUTBOX_RETENTION_DAYS:7}
    cleanup-cron: ${OUTBOX_CLEANUP_CRON:0 0 3 * * *}
