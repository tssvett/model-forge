spring:
  application:
    name: modelforge-kotlin-service

  # БД (H2 для локальной разработки)
  datasource:
    url: jdbc:h2:mem:modelforge
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: 8080

# Actuator: health, info, prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

# ModelForge
modelforge:
  environment: ${ENVIRONMENT:development}
  version: ${APP_VERSION:0.1.0}
  jwt:
    secret: ${JWT_SECRET_KEY:default-dev-secret-key-min-32-characters-long!!}
    expiration-hours: ${JWT_EXPIRATION_HOURS:24}
