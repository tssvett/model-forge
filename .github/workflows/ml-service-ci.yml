name: ML Service CI

on:
  push:
    branches: [ master ]
    paths:
      - 'ml-service/**'
      - '.github/workflows/ml-service-ci.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'ml-service/**'
      - '.github/workflows/ml-service-ci.yml'

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
          cache-dependency-path: ml-service/requirements.txt

      - name: Install dependencies
        working-directory: ml-service
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: ml-service
        run: PYTHONPATH=src pytest tests/ -v --tb=short

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image (mock)
        working-directory: ml-service
        run: docker build --build-arg MODE=mock -t modelforge-ml-service:mock .

      - name: Build Docker image (cpu)
        working-directory: ml-service
        run: docker build --build-arg MODE=cpu -t modelforge-ml-service:cpu .

      - name: Build Docker image (gpu)
        working-directory: ml-service
        run: docker build --build-arg MODE=gpu -t modelforge-ml-service:gpu .
