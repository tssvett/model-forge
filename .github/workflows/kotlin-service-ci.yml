name: Kotlin Service CI

on:
  push:
    branches: [ master ]
    paths:
      - 'kotlin-service/**'
      - '.github/workflows/kotlin-service-ci.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'kotlin-service/**'
      - '.github/workflows/kotlin-service-ci.yml'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Build
        working-directory: kotlin-service
        run: gradle build --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: kotlin-service/build/reports/tests/

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: kotlin-service
        run: docker build -t modelforge-kotlin-service:test .
